<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom YouTube Player</title>
    <style>
        /* Base page styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Full screen video iframe */
        #video-frame {
            width: 100%;
            height: 100%;
            border: none;
            transition: width 0.3s ease; /* Smooth transition when chat opens */
        }

        /* Floating Chat Button */
        #chat-btn {
            display: none; /* Hidden unless ?live=true is present */
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 18px;
            background-color: #cc0000;
            color: white;
            border: none;
            z-index: 1000;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: background-color 0.2s;
        }

        #chat-btn:hover {
            background-color: #ff0000;
        }

        /* The Chat Sidebar */
        #chat-container {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0;
            right: 0;
            width: 350px;
            height: 100%;
            background: #181818;
            z-index: 999;
            box-shadow: -2px 0 10px rgba(0,0,0,0.8);
        }

        #chat-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Shrink video when chat is open */
        .chat-open #video-frame {
            width: calc(100% - 350px);
        }
    </style>
</head>
<body>

    <button id="chat-btn">💬</button>

    <iframe id="video-frame" allowfullscreen allow="autoplay; encrypted-media"></iframe>

    <div id="chat-container">
        <iframe id="chat-frame"></iframe>
    </div>

    <script>
        // 1. Extract parameters from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        const isLive = urlParams.get('live') === 'true'; // Looking for &live=true

        // 2. Get the current domain (Required by YouTube for the chat embed)
        const currentDomain = window.location.hostname || "localhost"; 

        if (videoId) {
            // Load the YouTube video
            document.getElementById('video-frame').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;

            // 3. Handle Live Stream logic
            if (isLive) {
                const chatBtn = document.getElementById('chat-btn');
                const chatContainer = document.getElementById('chat-container');
                const chatFrame = document.getElementById('chat-frame');
                let chatOpen = false;

                // Show the floating button
                chatBtn.style.display = 'block';

                // Handle button clicks
                chatBtn.addEventListener('click', () => {
                    chatOpen = !chatOpen;
                    
                    if (chatOpen) {
                        // Only set the src when opened the first time to save bandwidth
                        if (!chatFrame.src) {
                            chatFrame.src = `https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${currentDomain}`;
                        }
                        
                        chatContainer.style.display = 'block';
                        document.body.classList.add('chat-open'); // Triggers CSS to shrink video
                        chatBtn.innerText = '❌';
                    } else {
                        chatContainer.style.display = 'none';
                        document.body.classList.remove('chat-open'); // Restores video to full width
                        chatBtn.innerText = '💬';
                    }
                });
            }
        } else {
            // Error handling if no ID is provided
            document.body.innerHTML = '<h2 style="color:white; text-align:center; margin-top: 20%; font-family: sans-serif;">No Video ID provided.<br><br>Usage: <code>player.html?id=YOUR_VIDEO_ID</code></h2>';
        }
    </script>
</body>
</html>
